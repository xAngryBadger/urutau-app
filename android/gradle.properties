# Permitir compilação sem NDK
android.useAndroidX=true
android.enableJetifier=true
org.gradle.jvmargs=-Xmx4096m
android.skipDeprecatedNdk=true
android.injected.build.model.only=false

# Gradle e o plugin Android precisam de Java 11+ (recomendado: JDK 17).
# Se aparecer "This build uses a Java 8 JVM": instale JDK 17 (https://adoptium.net)
# e descomente a linha abaixo com o caminho correto (barras duplas no Windows):
# org.gradle.java.home=C:\\Program Files\\Eclipse Adoptium\\jdk-17.0.13.11-hotspot
